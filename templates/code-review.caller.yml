# Copy to <repo>/.github/workflows/code-review.yml
# Calls the org-wide reusable OpenCodeReview workflow.
name: Code Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    # PR opened/reopened, or a PR comment starting with the trigger keyword.
    if: >
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null &&
        (startsWith(github.event.comment.body, '/ocr') ||
         startsWith(github.event.comment.body, '@ocr')))
    uses: dataplanelabs/workflows/.github/workflows/code-review.yml@main
    secrets: inherit
