# Copy to <repo>/.github/workflows/code-review.yml
# Minimal caller — triggers + keyword guard + concurrency live in the reusable workflow.
name: Code Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    uses: dataplanelabs/workflows/.github/workflows/code-review.yml@main
    secrets: inherit
