# Copy to <repo>/.github/workflows/code-review.yml
# Minimal caller — trigger keyword guard + concurrency live in the reusable workflow.
# `permissions` MUST be set here: a reusable workflow cannot be granted more than
# the caller's token, and the org default is read-only.
name: Code Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: dataplanelabs/workflows/.github/workflows/code-review.yml@main
    secrets: inherit
