# Copy to <repo>/.github/workflows/code-review.yml
# Trigger keyword guard + concurrency live in the reusable workflow.
# `permissions` MUST be set here (org default token is read-only).
# Secrets are passed EXPLICITLY, not via `secrets: inherit`: inherit does not
# pass secrets from a private repo into a public reusable workflow, nor across
# owner boundaries. Explicit passing works in every case.
name: Code Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: dataplanelabs/workflows/.github/workflows/code-review.yml@main
    secrets:
      OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
      OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
      OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
      OCR_LLM_USE_ANTHROPIC: ${{ secrets.OCR_LLM_USE_ANTHROPIC }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_MUNMIU_PRIVATE_KEY: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}
